name: swagger-ui-electron

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check_version
        run: |
          curl https://registry.npmjs.org/swagger-ui-dist/latest > npm.json
          curl https://api.github.com/repos/ke4nec/swagger-ui-electron/releases/latest > github.json
          node sync.js
          if [ $? == 1 ]; then exit 0; fi

  build:
    needs: check
    runs-on: ubuntu-latest
    container:
      image: electronuserland/builder:wine
    outputs:
      ver: ${{ steps.prepare.outputs.ver }}
    steps:
      - uses: actions/checkout@v4
      - name: prepare
        id: prepare
        run: |
          curl https://registry.npmjs.org/swagger-ui-dist/latest > npm.json
          curl https://api.github.com/repos/ke4nec/swagger-ui-electron/releases/latest > github.json
          node sync.js
          if [ $? == 1 ]; then exit 0; fi
          export VER=$(cat ver.txt)
          echo "ver=$VER" >> $GITHUB_OUTPUT
          apt-get update && apt-get install -y zip && chown root:root /github/home
      - run: |
          npm i swagger-ui-dist@latest
          npm i
          npm run make-all
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: out/make/zip/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: ./artifacts
      - name: Find and list artifacts
        id: find_artifacts
        run: |
          echo "=== Listing all artifacts ==="
          find ./artifacts -type f -name "*.zip" | while read file; do
            echo "Found: $file"
          done
          
          # Find actual zip files
          MACOS_ZIP=$(find ./artifacts -name "*darwin*x64*.zip" | head -1)
          LINUX_ZIP=$(find ./artifacts -name "*linux*x64*.zip" | head -1)
          WINDOWS_ZIP=$(find ./artifacts -name "*win32*x64*.zip" | head -1)
          
          echo "macos_zip=$MACOS_ZIP" >> $GITHUB_OUTPUT
          echo "linux_zip=$LINUX_ZIP" >> $GITHUB_OUTPUT
          echo "windows_zip=$WINDOWS_ZIP" >> $GITHUB_OUTPUT
          
          echo "MacOS artifact: $MACOS_ZIP"
          echo "Linux artifact: $LINUX_ZIP"
          echo "Windows artifact: $WINDOWS_ZIP"
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.ver }}
          name: swagger-ui-electron-v${{ needs.build.outputs.ver }}
          draft: false
          prerelease: false
          files: |
            ${{ steps.find_artifacts.outputs.macos_zip }}
            ${{ steps.find_artifacts.outputs.linux_zip }}
            ${{ steps.find_artifacts.outputs.windows_zip }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
