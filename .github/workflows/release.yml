name: swagger-ui-electron

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check-version.outputs.version }}
      should-release: ${{ steps.check-version.outputs.should-release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check version
        id: check-version
        run: |
          curl -s https://registry.npmjs.org/swagger-ui-dist/latest > npm.json
          curl -s https://api.github.com/repos/ke4nec/swagger-ui-electron/releases/latest > github.json
          
          node sync.js
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -eq 0 ]; then
            VERSION=$(cat ver.txt)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "should-release=true" >> $GITHUB_OUTPUT
            echo "✓ New version available: $VERSION"
          else
            echo "version=none" >> $GITHUB_OUTPUT
            echo "should-release=false" >> $GITHUB_OUTPUT
            echo "✓ No update needed"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ${{ matrix.os == 'darwin' && 'macos-latest' || (matrix.os == 'win32' && 'windows-latest' || 'ubuntu-latest') }}
    strategy:
      matrix:
        os: [win32, linux, darwin]
        include:
          - os: win32
            script: make-win
          - os: linux
            script: make-linux
          - os: darwin
            script: make-mac
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm i swagger-ui-dist@latest
          npm i

      - name: Build for ${{ matrix.os }}
        run: npm run ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swagger-ui-electron-${{ matrix.os }}
          path: out/make/zip/*.zip
          retention-days: 7

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: swagger-ui-electron-v${{ needs.check-version.outputs.version }}
          draft: false
          prerelease: false
          files: ./artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
